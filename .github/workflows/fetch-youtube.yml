name: Fetch YouTube Data

on:
  schedule:
    # Run daily at 6 AM UTC (midnight MDT)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest shorts, videos and channel stats from YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UC88w6T7O_jV_G5eSUWBhVVw
        run: |
          set -euo pipefail

          # Uploads playlist = channel ID with UC → UU. More reliable than
          # search, and maxResults=50 covers enough history that a Shorts-
          # heavy stretch still leaves 6+ long-form videos for the grid.
          uploads_playlist="UU${CHANNEL_ID#UC}"
          uploads_response=$(curl -s "https://www.googleapis.com/youtube/v3/playlistItems?key=${YOUTUBE_API_KEY}&playlistId=${uploads_playlist}&part=snippet&maxResults=50")

          video_ids=$(echo "$uploads_response" | jq -r '[.items[]?.snippet.resourceId.videoId] | join(",")')
          if [ -z "$video_ids" ] || [ "$video_ids" = "null" ]; then
            echo "ERROR: uploads playlist returned no video IDs" >&2
            echo "$uploads_response" | jq . >&2 || echo "$uploads_response" >&2
            exit 1
          fi

          # Details (duration + description) for classification and gear links.
          # videos.list accepts up to 50 IDs per call — same as playlist page size.
          details=$(curl -s "https://www.googleapis.com/youtube/v3/videos?key=${YOUTUBE_API_KEY}&id=${video_ids}&part=contentDetails,snippet,statistics")

          # Classify Shorts. Shorts can be up to 3 minutes (since Oct 2024), so
          # duration alone is ambiguous: for every video <= 180s, confirm via the
          # /shorts/ URL (a real Short returns HTTP 200; regular videos redirect).
          candidates=$(echo "$details" | jq -r '.items[] |
            select(
              (.contentDetails.duration
                | capture("^PT(?:(?<h>[0-9]+)H)?(?:(?<m>[0-9]+)M)?(?:(?<s>[0-9]+)S)?$")?
                // {h: null, m: null, s: null}
                | ((.h // "0") | tonumber) * 3600 + ((.m // "0") | tonumber) * 60 + ((.s // "0") | tonumber)
              ) as $secs | $secs > 0 and $secs <= 180
            ) | .id')

          short_ids="[]"
          for id in $candidates; do
            # No -L: a real Short serves 200; a regular video redirects (3xx).
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://www.youtube.com/shorts/${id}")
            if [ "$status" = "200" ]; then
              short_ids=$(echo "$short_ids" | jq --arg id "$id" '. + [$id]')
            fi
          done

          # Shorts rail — dedicated Shorts playlist (UC → UUSH).
          shorts_playlist="UUSH${CHANNEL_ID#UC}"
          playlist_response=$(curl -s "https://www.googleapis.com/youtube/v3/playlistItems?key=${YOUTUBE_API_KEY}&playlistId=${shorts_playlist}&part=snippet&maxResults=6")
          shorts=$(echo "$playlist_response" | jq '[.items[]? |
            {
              id: .snippet.resourceId.videoId,
              title: .snippet.title,
              thumbnail: (.snippet.thumbnails.high.url // .snippet.thumbnails.medium.url // .snippet.thumbnails.default.url // ""),
              publishedAt: .snippet.publishedAt
            }
          ]')

          # Fallback: confirmed Shorts among recent uploads.
          if [ "$(echo "$shorts" | jq 'length')" = "0" ]; then
            shorts=$(echo "$details" | jq --argjson short_ids "$short_ids" '[.items[] |
              select(.id as $i | $short_ids | index($i)) |
              {
                id: .id,
                title: .snippet.title,
                thumbnail: (.snippet.thumbnails.high.url // .snippet.thumbnails.medium.url // ""),
                publishedAt: .snippet.publishedAt
              }
            ] | .[0:6]')
          fi

          # Long-form: not a confirmed Short. Playlist order is newest-first.
          # Take 6 so latest + "More from the shop" stay full even when Shorts dominate.
          videos=$(echo "$details" | jq --argjson short_ids "$short_ids" '[.items[] |
            select(.id as $i | $short_ids | index($i) | not) |
            {
              id: .id,
              title: .snippet.title,
              publishedAt: .snippet.publishedAt,
              duration: .contentDetails.duration
            }
          ] | .[0:6]')

          # Gear: product links + coupon codes from long-form descriptions.
          # scripts/parse_gear.py picks a.co / amzn.to / geni.us / amazon product
          # URLs and any nearby "code HIGGPROJECTS" / "10% off" text.
          gear=$(echo "$details" | jq --argjson short_ids "$short_ids" -c '
            {items: [.items[]
              | select(.id as $i | $short_ids | index($i) | not)
              | {id: .id, title: .snippet.title, description: .snippet.description}
            ]}
          ' | python3 scripts/parse_gear.py)
          if ! echo "$gear" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "WARN: gear parse failed, using empty list" >&2
            gear='[]'
          fi

          channel=$(curl -s "https://www.googleapis.com/youtube/v3/channels?key=${YOUTUBE_API_KEY}&id=${CHANNEL_ID}&part=statistics")

          if [ "$(echo "$channel" | jq '.items | length')" = "0" ]; then
            echo "ERROR: channel stats lookup failed" >&2
            echo "$channel" | jq . >&2 || echo "$channel" >&2
            exit 1
          fi

          jq -n --argjson shorts "$shorts" --argjson videos "$videos" --argjson gear "$gear" --argjson channel "$channel" '{
            shorts: $shorts,
            videos: $videos,
            gear: $gear,
            stats: {
              subscriberCount: $channel.items[0].statistics.subscriberCount,
              videoCount: $channel.items[0].statistics.videoCount,
              viewCount: $channel.items[0].statistics.viewCount,
              updatedAt: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
            }
          }' > youtube.json

          echo "Fetched data:"
          cat youtube.json
          echo ""
          echo "Counts — videos: $(jq '.videos | length' youtube.json), shorts: $(jq '.shorts | length' youtube.json), gear: $(jq '.gear | length' youtube.json)"
          echo "Gear codes: $(jq -r '[.gear[] | select(.code != null) | "\(.id)=\(.code)"] | join(", ")' youtube.json)"

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add youtube.json
          git diff --quiet --staged || (git commit -m "Update YouTube data" && git pull --rebase && git push)
